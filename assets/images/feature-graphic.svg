<svg width="1024" height="500" viewBox="0 0 1024 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="500" fill="#0C0C0C"/>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="fadeGrid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="white" stop-opacity="0.4"/>
      <stop offset="0.5" stop-color="white" stop-opacity="0.12"/>
      <stop offset="1" stop-color="white" stop-opacity="0.4"/>
    </linearGradient>
    <mask id="gridMask">
      <rect width="1024" height="500" fill="url(#fadeGrid)"/>
    </mask>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0" stop-color="#34D399" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#34D399" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Grid background -->
  <rect width="1024" height="500" fill="url(#grid)" mask="url(#gridMask)"/>

  <!-- Subtle center glow -->
  <ellipse cx="512" cy="230" rx="500" ry="220" fill="url(#glow)"/>

  <!-- ROS node decorations - left -->
  <circle cx="150" cy="250" r="55" stroke="#34D399" stroke-width="1" fill="none" opacity="0.2"/>
  <circle cx="150" cy="250" r="6" fill="#34D399" opacity="0.35"/>
  <circle cx="100" cy="198" r="4" fill="#34D399" opacity="0.2"/>
  <circle cx="200" cy="198" r="4" fill="#34D399" opacity="0.2"/>
  <circle cx="100" cy="302" r="4" fill="#34D399" opacity="0.2"/>
  <circle cx="200" cy="302" r="4" fill="#34D399" opacity="0.2"/>
  <line x1="104" y1="201" x2="145" y2="245" stroke="#34D399" stroke-width="0.7" opacity="0.15"/>
  <line x1="196" y1="201" x2="155" y2="245" stroke="#34D399" stroke-width="0.7" opacity="0.15"/>
  <line x1="104" y1="299" x2="145" y2="255" stroke="#34D399" stroke-width="0.7" opacity="0.15"/>
  <line x1="196" y1="299" x2="155" y2="255" stroke="#34D399" stroke-width="0.7" opacity="0.15"/>

  <!-- ROS node decorations - right -->
  <circle cx="874" cy="250" r="55" stroke="#34D399" stroke-width="1" fill="none" opacity="0.2"/>
  <circle cx="874" cy="250" r="6" fill="#34D399" opacity="0.35"/>
  <circle cx="824" cy="198" r="4" fill="#34D399" opacity="0.2"/>
  <circle cx="924" cy="198" r="4" fill="#34D399" opacity="0.2"/>
  <circle cx="824" cy="302" r="4" fill="#34D399" opacity="0.2"/>
  <circle cx="924" cy="302" r="4" fill="#34D399" opacity="0.2"/>
  <line x1="828" y1="201" x2="869" y2="245" stroke="#34D399" stroke-width="0.7" opacity="0.15"/>
  <line x1="920" y1="201" x2="879" y2="245" stroke="#34D399" stroke-width="0.7" opacity="0.15"/>
  <line x1="828" y1="299" x2="869" y2="255" stroke="#34D399" stroke-width="0.7" opacity="0.15"/>
  <line x1="920" y1="299" x2="879" y2="255" stroke="#34D399" stroke-width="0.7" opacity="0.15"/>

  <!-- Green accent line -->
  <rect x="320" y="252" width="384" height="3" fill="#34D399" opacity="0.7"/>

  <!-- "ROS" in green -->
  <text x="512" y="238" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="130" font-weight="800" fill="#34D399" letter-spacing="-2">ROS</text>

  <!-- "deck" in white -->
  <text x="512" y="345" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="105" font-weight="700" fill="white" letter-spacing="-1">deck</text>

  <!-- Tagline -->
  <text x="512" y="400" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#9CA3AF" letter-spacing="4">ROBOT DASHBOARD FOR MOBILE</text>

  <!-- Bottom bar matching icon -->
  <rect x="0" y="462" width="1024" height="38" fill="#141414"/>
  <rect x="0" y="462" width="380" height="38" fill="#34D399"/>
  <path d="M380 462V500L416 481L380 462Z" fill="#34D399"/>
  <rect x="416" y="462" width="608" height="38" fill="#1E3226"/>
</svg>
